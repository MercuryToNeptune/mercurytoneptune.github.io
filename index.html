<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The 5-Year Vision</title>
    <style>
        :root {
            --bg-color: #020617;
            --text-color: #f8fafc;
            --bar-bg: #1e293b;
            --accent-1: #3b82f6;
            --accent-2: #10b981;
            /* New Slate shades for text hierarchy */
            --text-muted: #64748b;
            --text-dim: #334155;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            width: 90%;
            text-align: center;
            /* Soft entrance animation for the whole UI */
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 3rem);
            margin-bottom: 12px;
            font-weight: 900;
            letter-spacing: -0.04em;
            background: linear-gradient(to bottom, #ffffff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: clamp(0.75rem, 2.5vw, 0.85rem);
            margin-bottom: 48px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 500;
            line-height: 1.6;
        }

        .subtitle span {
            display: block;
            color: var(--text-dim);
            font-weight: 400;
            margin-top: 4px;
        }

        .progress-wrapper {
            background-color: var(--bar-bg);
            border-radius: 40px;
            height: 24px; /* Slightly slimmer for a sleeker look */
            width: 100%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .progress-fill {
            height: 100%;
            width: 0%; 
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-1));
            background-size: 200% 100%;
            border-radius: 40px;
            position: relative;
            transition: width 2.5s cubic-bezier(0.22, 1, 0.36, 1);
            animation: flow 3s linear infinite;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .progress-fill::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.2) 50%,
                transparent 100%
            );
            background-size: 200% 100%;
            animation: sparkle 4s infinite;
        }

        @keyframes flow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        @keyframes sparkle {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            /* Using monospace so the "DAYS" text doesn't shift when numbers change */
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        .percentage-container {
            margin-top: 40px;
        }

        .percentage {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: clamp(1.8rem, 5vw, 2.2rem);
            font-weight: 300;
            color: #fff;
            letter-spacing: -0.02em;
        }

        .percentage-label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-top: 8px;
        }

        .footer-note {
            margin-top: 80px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-style: italic;
            line-height: 1.8;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
            border-top: 1px solid var(--text-dim);
            padding-top: 20px;
        }

        /* Styling for mobile to ensure clear breathing room */
        @media (max-width: 480px) {
            .footer-note {
                font-size: 0.75rem;
                margin-top: 60px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Five Year Horizon</h1>
    <p class="subtitle">
        How do you achieve the impossible? 
        <span>One step after another.</span>
    </p>

    <div class="progress-wrapper">
        <div class="progress-fill" id="progress-fill"></div>
    </div>

    <div class="stats">
        <span id="days-text">0 DAYS IN</span>
        <span id="target-text">EST. APRIL 2030</span>
    </div>

    <div class="percentage-container">
        <span class="percentage" id="percentage-text">0.0000%</span>
        <span class="percentage-label">Total Completion</span>
    </div>

    <div class="footer-note">
        "Do it happy, do it sad, do it strong, do it weak... <br><strong>Do it anyway.</strong>"
    </div>
</div>

<script>
    function updateProgress() {
        const startDate = new Date('2025-04-01T00:00:00').getTime();
        const endDate = new Date('2030-04-01T00:00:00').getTime();
        const now = new Date().getTime();

        const totalDuration = endDate - startDate;
        const passedDuration = now - startDate;

        let percentage = (passedDuration / totalDuration) * 100;
        
        if (percentage < 0) percentage = 0;
        if (percentage > 100) percentage = 100;

        const daysPassed = Math.floor(passedDuration / (1000 * 60 * 60 * 24));
        
        const fill = document.getElementById('progress-fill');
        const pctText = document.getElementById('percentage-text');
        const daysText = document.getElementById('days-text');

        setTimeout(() => {
            fill.style.width = percentage + '%';
        }, 100);

        // Using 4 decimals to ensure the user sees movement
        pctText.innerText = percentage.toFixed(4) + '%';
        daysText.innerText = (daysPassed > 0 ? daysPassed : 0) + ' DAYS IN';
    }

    updateProgress();
    setInterval(updateProgress, 5000); // Updated to 5 seconds for smoother tracking
</script>

</body>
</html>
